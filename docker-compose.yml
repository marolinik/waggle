services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: waggle
      POSTGRES_PASSWORD: waggle_dev
      POSTGRES_DB: waggle
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6381:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
